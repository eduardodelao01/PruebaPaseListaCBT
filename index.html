<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Control de Asistencia - Escáner</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
    h1 { color: #0d6efd; margin-bottom: 5px; font-size: 26px; }
    h2 { color: #888; font-size: 16px; margin-top: 0; margin-bottom: 25px; font-weight: normal; }
    
    button { width: 85%; max-width: 320px; padding: 16px; font-size: 18px; border: none; border-radius: 50px; background: #0d6efd; color: white; font-weight: bold; cursor: pointer; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(13,110,253,0.4); transition: 0.2s; }
    button:active { transform: scale(0.98); }
    
    #interactive.viewport { position: relative; width: 100%; max-width: 440px; height: 280px; margin: 0 auto; border: 3px solid #0d6efd; border-radius: 15px; overflow: hidden; background: #000; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
    #interactive.viewport video { width: 100%; height: 100%; object-fit: cover; }
    
    .linea-guia { position: absolute; top: 50%; left: 5%; width: 90%; height: 2px; background: red; box-shadow: 0 0 10px red; z-index: 10; transform: translateY(-50%); }
    
    /* Contenedor de Alertas Dinámicas */
    #tarjeta-resultado { 
      margin-top: 25px; 
      padding: 20px; 
      background: #2a2a2a; 
      border-radius: 12px; 
      border: 1px solid #444; 
      display: inline-block; 
      width: 85%; 
      max-width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    
    #mensaje-principal { font-size: 18px; font-weight: bold; margin: 0; color: #aaa; }
    #codigo-leido { font-size: 14px; color: #888; margin-top: 8px; font-family: monospace; }
    
    /* Estilos de estados */
    .estado-exito { background: #14532d !important; border-color: #16a34a !important; color: #bbf7d0 !important; }
    .estado-duplicado { background: #713f12 !important; border-color: #ca8a04 !important; color: #fef08a !important; }
    .estado-error { background: #7f1d1d !important; border-color: #dc2626 !important; color: #fecaca !important; }
  </style>
</head>
<body>

  <h1>Pase de Lista Pro</h1>
  <h2>Escáner de Códigos de Barra</h2>
  
  <button onclick="iniciarEscaneo()">📷 INICIAR ASISTENCIA</button>

  <div id="interactive" class="viewport">
    <div class="linea-guia"></div>
  </div>

  <div id="tarjeta-resultado">
    <p id="mensaje-principal">Presiona el botón para encender la cámara</p>
    <div id="codigo-leido">Esperando alumno...</div>
  </div>

  <script>
    // 🔴 REEMPLAZA CON TU NUEVA URL DE GOOGLE APPS SCRIPT:
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbxdItEf_dZPeLiDVsVEYBCgx6LHEmUlRdggI0wrfZlnV2icfnete1hBRW-HmI-v0ptlzg/exec";

    const tarjeta = document.getElementById("tarjeta-resultado");
    const msgPrincipal = document.getElementById("mensaje-principal");
    const txtCodigo = document.getElementById("codigo-leido");

    function iniciarEscaneo() {
      // Limpiar clases visuales previas
      tarjeta.className = "";
      msgPrincipal.innerHTML = "Buscando código del alumno...";
      txtCodigo.innerHTML = "Apunta al código de barras";

      Quagga.init({
        inputStream: {
          name: "Live",
          type: "LiveStream",
          target: document.querySelector('#interactive'),
          constraints: { 
            width: { min: 640, ideal: 1280 },
            height: { min: 480, ideal: 720 },
            facingMode: "environment",
            advanced: [{ focusMode: "continuous" }]
          }
        },
        decoder: { 
          readers: ["ean_reader", "upc_reader", "code_128_reader", "code_39_reader"] 
        }
      }, function(err) {
        if (err) {
          msgPrincipal.innerHTML = "❌ Error al acceder a la cámara";
          tarjeta.classList.add("estado-error");
          return;
        }
        Quagga.start();
      });

      Quagga.onDetected(function(data) {
        const codigo = data.codeResult.code.trim();
        Quagga.stop(); // Detiene la cámara temporalmente para procesar

        msgPrincipal.innerHTML = "⏳ Verificando en la base de datos...";
        txtCodigo.innerHTML = "Matrícula: " + codigo;

        // Enviamos el código al backend mediante FETCH usando el modo "cors" adaptado
        fetch(URL_APPS_SCRIPT, {
          method: "POST",
          body: JSON.stringify({ codigo: codigo })
        })
        .then(response => response.json())
        .then(resultado => {
          
          // Limpiamos estilos anteriores
          tarjeta.className = "";
          
          if (resultado.status === "success") {
            // El servidor confirmó que es una asistencia NUEVA hoy
            tarjeta.classList.add("estado-exito");
            msgPrincipal.innerHTML = resultado.message;
          } 
          else if (resultado.status === "duplicado") {
            // El servidor detectó que ya se registró hoy
            tarjeta.classList.add("estado-duplicado");
            msgPrincipal.innerHTML = resultado.message;
          } 
          else {
            tarjeta.classList.add("estado-error");
            msgPrincipal.innerHTML = resultado.message;
          }

          // Espera 3 segundos mostrando el resultado y reactiva la cámara automáticamente para el siguiente alumno
          setTimeout(iniciarEscaneo, 3000);
        })
        .catch(err => {
          tarjeta.className = "";
          tarjeta.classList.add("estado-error");
          msgPrincipal.innerHTML = "❌ Error de conexión con Google Sheets";
          setTimeout(iniciarEscaneo, 3000);
        });
      });
    }
  </script>
</body>
</html>
